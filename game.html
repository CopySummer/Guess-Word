<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜词达人</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0f0f1a;--card:#1a1a2e;--accent:#e94560;--accent2:#533483;
    --text:#eee;--dim:#888;--green:#1b5e20;--yellow:#fbc02d;--orange:#e65100;
    --radius:12px;
  }
  body{
    font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;flex-direction:column;align-items:center;padding:20px;
  }
  h1{
    font-size:2.2rem;margin:30px 0 6px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    letter-spacing:4px;
  }
  .subtitle{color:var(--dim);font-size:.9rem;margin-bottom:24px}
  .input-area{
    display:flex;gap:10px;width:100%;max-width:460px;margin-bottom:10px;
  }
  #guessInput{
    flex:1;padding:14px 18px;font-size:1.1rem;border:2px solid #333;
    border-radius:var(--radius);background:#16162a;color:var(--text);
    outline:none;transition:border .2s;
  }
  #guessInput:focus{border-color:var(--accent)}
  #guessInput::placeholder{color:#555}
  #submitBtn{
    padding:14px 28px;font-size:1.05rem;border:none;border-radius:var(--radius);
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;cursor:pointer;font-weight:600;transition:transform .1s,opacity .2s;
    letter-spacing:2px;
  }
  #submitBtn:hover{opacity:.9}
  #submitBtn:active{transform:scale(.96)}
  #submitBtn:disabled{opacity:.4;cursor:not-allowed}
  .hint{color:var(--dim);font-size:.82rem;margin-bottom:18px;text-align:center}
  .history{width:100%;max-width:460px;display:flex;flex-direction:column;gap:8px;margin-top:8px}
  .history-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;border-radius:var(--radius);
    background:var(--card);border-left:4px solid #333;
    animation:slideIn .3s ease;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .history-item .word{font-size:1.1rem;font-weight:600;min-width:60px}
  .history-item .bar-wrap{
    flex:1;margin:0 16px;height:8px;background:#222;border-radius:4px;overflow:hidden;
  }
  .history-item .bar{height:100%;border-radius:4px;transition:width .6s ease}
  .history-item .pct{font-size:.95rem;font-weight:700;min-width:64px;text-align:right}
  .history-item.hi{border-left-color:#1b5e20}
  .history-item.mid{border-left-color:#fbc02d}
  .history-item.low{border-left-color:#e65100}
  .history-item.cold{border-left-color:#9e9e9e}
  .stats{
    display:flex;gap:24px;margin:18px 0 10px;color:var(--dim);font-size:.88rem;
  }
  .stats span{color:var(--text);font-weight:700}
  .new-game-btn{
    margin-top:16px;padding:10px 24px;font-size:.95rem;border:2px solid var(--accent);
    border-radius:var(--radius);background:transparent;color:var(--accent);
    cursor:pointer;transition:all .2s;display:none;
  }
  .new-game-btn:hover{background:var(--accent);color:#fff}
  .reveal-btn{
    margin-top:8px;padding:6px 16px;font-size:.78rem;border:1px solid #444;
    border-radius:8px;background:transparent;color:var(--dim);
    cursor:pointer;transition:all .2s;
  }
  .reveal-btn:hover{border-color:var(--dim);color:var(--text)}
  .custom-btn{
    margin-top:8px;padding:6px 16px;font-size:.78rem;border:1px solid #666;
    border-radius:8px;background:transparent;color:#888;
    cursor:pointer;transition:all .2s;margin-left:8px;
  }
  .custom-btn:hover{border-color:#888;color:#aaa}
  /* Victory overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
    align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px);
  }
  .overlay.show{display:flex}
  .victory-card{
    background:var(--card);border-radius:20px;padding:48px 40px;text-align:center;
    animation:popIn .4s ease;max-width:380px;width:90%;
  }
  @keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .victory-card .emoji{font-size:4rem;margin-bottom:12px}
  .victory-card h2{font-size:1.8rem;margin-bottom:8px}
  .victory-card .answer-word{
    font-size:2.6rem;font-weight:800;margin:12px 0;
    background:linear-gradient(135deg,var(--accent),#ff9a00);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  }
  .victory-card p{color:var(--dim);margin-bottom:20px;line-height:1.6}
  .victory-card button{
    padding:12px 32px;font-size:1rem;border:none;border-radius:var(--radius);
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;cursor:pointer;font-weight:600;letter-spacing:2px;
  }
  /* Confetti */
  .confetti{position:fixed;pointer-events:none;z-index:200}
  .confetti i{
    position:absolute;display:block;width:10px;height:10px;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1}
    100%{transform:translateY(100vh) rotate(720deg);opacity:0}
  }
  /* Mode switch */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin: 30px 0 0;
    position: relative;
  }
  h1 {
    margin: 0;
  }
  .mode-switch {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid #2a2a42;
  }
  .mode-btn {
    padding: 6px 16px;
    font-size: 0.85rem;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .mode-btn:hover {
    color: var(--text);
    background: #2a2a42;
  }
  .mode-btn.active {
    background: var(--accent);
    color: white;
    font-weight: 600;
  }

  /* Responsive */
  @media(max-width:500px){
    .header-row {
      flex-direction: column;
      gap: 12px;
    }
    .mode-switch {
      width: 100%;
      max-width: 240px;
    }
    h1{font-size:1.6rem}
    .input-area{flex-direction:column}
    #submitBtn{width:100%}
    .history-item .word{min-width:48px;font-size:.95rem}
    .history-item .pct{font-size:.85rem;min-width:52px}
  }
</style>
</head>
<body>

<div class="header-row">
  <h1>猜词达人</h1>
  <div class="mode-switch">
    <button class="mode-btn active" data-mode="word">猜词</button>
    <button class="mode-btn" data-mode="person">猜人物</button>
  </div>
</div>
<p class="subtitle" id="subtitleText">猜一个中文名词，试试看几次能猜中！</p>

<div class="input-area">
  <input id="guessInput" type="text" placeholder="输入你的猜测…" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <button id="submitBtn">猜测</button>
</div>
<p class="hint">💡 颜色越深 → 关联度越高！你离答案越近！</p>

<div class="stats">
  已猜 <span id="tryCount">0</span> 次 &nbsp;|&nbsp; 最高关联 <span id="bestPct">—</span>
</div>

<div class="history" id="history"></div>
<button class="new-game-btn" id="newGameBtn" onclick="newGame()">🔄 再来一局</button>
<button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">👁️ 查看答案</button>
<button class="custom-btn" id="customBtn" onclick="setCustomQuestion()">📝 出题</button>

<div class="overlay" id="overlay">
  <div class="victory-card">
    <div class="emoji">🎉</div>
    <h2>恭喜猜中！</h2>
    <div class="answer-word" id="answerReveal"></div>
    <p id="victoryMsg"></p>
    <button onclick="newGame()">🔄 再来一局</button>
  </div>
</div>

function cosineSim(a, b) {
  let dot = 0, na = 0, nb = 0;
  for (let i = 0; i < a.length; i++) {
    dot += a[i] * b[i];
    na += a[i] * a[i];
    nb += b[i] * b[i];
  }
  return dot / (Math.sqrt(na) * Math.sqrt(nb));
}

// 三国人物相似度算法
function threeKingdomsSimilarity(guess, target, gObj, tObj) {
  // 基础分
  let score = 0;
  
  // 1. 所属势力匹配（权重最高）
  const gFaction = getFaction(gObj.cat);
  const tFaction = getFaction(tObj.cat);
  if (gFaction && tFaction && gFaction === tFaction) {
    score += 30; // 同一势力加分
  } else if (gFaction && tFaction) {
    // 不同势力但有关系（如曹操和关羽曾有过接触）
    if (hasHistoricalConnection(guess, target)) {
      score += 15;
    } else if (areAlliesOrEnemies(guess, target)) {
      score += 10;
    }
  }
  
  // 2. 人物角色匹配
  const gRole = getRole(gObj.cat);
  const tRole = getRole(tObj.cat);
  if (gRole && tRole && gRole === tRole) {
    score += 20; // 相同角色（如都是君主、武将、谋士等）
  } else if (areComplementaryRoles(gRole, tRole)) {
    score += 10; // 互补角色（如君主和谋士）
  }
  
  // 3. 直接关系检查（新增）
  const hasDirectRelation = checkDirectRelation(gObj, tObj);
  if (hasDirectRelation) {
    score += 25; // 直接关系（父子、兄弟、夫妻等）权重较高
  }
  
  // 4. 历史关系强度
  const relationStrength = getRelationStrength(guess, target);
  score += relationStrength * 15;
  
  // 4. 历史评价相似度
  const gReputation = getReputation(gObj.desc);
  const tReputation = getReputation(tObj.desc);
  if (gReputation && tReputation && Math.abs(gReputation - tReputation) <= 1) {
    score += 10;
  }
  
  // 5. 字符重叠（次要因素）
  const gChars = new Set(guess.split(''));
  const tChars = new Set(target.split(''));
  let charMatch = 0;
  gChars.forEach(c => { if (tChars.has(c)) charMatch++; });
  const unionSz = new Set([...gChars, ...tChars]).size;
  const jaccard = unionSz > 0 ? charMatch / unionSz : 0;
  score += Math.round(jaccard * 15);
  
  // 确保分数在合理范围内
  score = Math.max(8, Math.min(95, score));
  // 截取后加上关系强度原始值，体现差异化（value越大越接近100）
  score = Math.min(100, score + Math.max(0, relationStrength));
  
  // 如果是桃园结义兄弟，特殊处理
  if (areSwornBrothers(guess, target)) {
    score = Math.max(score, 60); // 至少60分
  }
  
  // 如果是著名对手，适当加分
  if (areFamousRivals(guess, target)) {
    score = Math.min(score + 10, 90);
  }
  
  return { pct: score, exact: false };
}

// 辅助函数
function getFaction(categories) {
  if (!categories) return null;
  const factions = ["魏", "蜀", "吴", "汉", "群雄", "晋", "蛮"];
  for (const faction of factions) {
    if (categories.includes(faction)) return faction;
  }
  return null;
}

function getRole(categories) {
  if (!categories) return null;
  const roles = ["君主", "武将", "军师", "谋士", "文官", "文人", "女子", "权臣", "蛮将"];
  for (const role of roles) {
    if (categories.includes(role)) return role;
  }
  return null;
}

function hasHistoricalConnection(person1, person2) {
  // 常见历史关系
  const connections = [
    ["曹操", "关羽"], ["曹操", "刘备"], ["曹操", "孙权"],
    ["刘备", "关羽"], ["刘备", "张飞"], ["刘备", "诸葛亮"],
    ["关羽", "张飞"], ["诸葛亮", "周瑜"], ["周瑜", "曹操"],
    ["司马懿", "诸葛亮"], ["孙权", "刘备"], ["孙权", "曹操"]
  ];
  
  for (const [p1, p2] of connections) {
    if ((person1 === p1 && person2 === p2) || (person1 === p2 && person2 === p1)) {
      return true;
    }
  }
  return false;
}

function areAlliesOrEnemies(person1, person2) {
  // 盟友关系
  const allies = [
    ["刘备", "关羽"], ["刘备", "张飞"], ["刘备", "诸葛亮"],
    ["曹操", "夏侯惇"], ["曹操", "夏侯渊"], ["曹操", "郭嘉"],
    ["曹操", "荀彧"], ["曹操", "荀攸"], 
    ["孙权", "周瑜"], ["孙权", "鲁肃"], ["孙权", "吕蒙"],
    ["关羽", "张飞"], ["张飞", "关羽"]
  ];
  
  // 敌对关系
  const enemies = [
    ["曹操", "刘备"], ["曹操", "孙权"], ["刘备", "曹操"],
    ["关羽", "曹操"], ["诸葛亮", "司马懿"], ["周瑜", "诸葛亮"],
    ["刘备", "孙权"], ["孙权", "刘备"]
  ];
  
  for (const [p1, p2] of [...allies, ...enemies]) {
    if ((person1 === p1 && person2 === p2) || (person1 === p2 && person2 === p1)) {
      return true;
    }
  }
  return false;
}

function areComplementaryRoles(role1, role2) {
  if (!role1 || !role2) return false;
  const complementaryPairs = [
    ["君主", "谋士"], ["君主", "武将"], ["谋士", "君主"],
    ["武将", "君主"], ["军师", "君主"], ["君主", "军师"]
  ];
  
  for (const [r1, r2] of complementaryPairs) {
    if ((role1 === r1 && role2 === r2) || (role1 === r2 && role2 === r1)) {
      return true;
    }
  }
  return false;
}

function getReputation(description) {
  if (!description) return 0;
  // 简单的情感分析
  const positiveWords = ["忠义", "仁义", "智慧", "勇猛", "英俊", "老将", "神射手", "才高八斗", "鬼才", "王佐之才"];
  const negativeWords = ["暴虐", "反复", "反骨", "乐不思蜀", "三姓家奴"];
  
  let score = 0;
  for (const word of positiveWords) {
    if (description.includes(word)) score += 1;
  }
  for (const word of negativeWords) {
    if (description.includes(word)) score -= 1;
  }
  return score;
}

// 检查直接关系（使用rels属性）
function checkDirectRelation(obj1, obj2) {
  if (!obj1 || !obj2) return false;
  
  // 检查obj1的rels是否包含obj2的名字
  if (obj1.rels && Array.isArray(obj1.rels)) {
    if (obj1.rels.includes(obj2.w)) return true;
  }
  
  // 检查obj2的rels是否包含obj1的名字
  if (obj2.rels && Array.isArray(obj2.rels)) {
    if (obj2.rels.includes(obj1.w)) return true;
  }
  
  return false;
}

function similarity(guess, target) {
  const isExact = (guess === target);
  if (isExact) return { pct: 100, exact: true };

  // 查找猜测词和目标词在词库中的对象
  const gObj = WORDS.find(w => w.w === guess) || THREE_KINGDOMS_PERSONS.find(w => w.w === guess);
  const tObj = WORDS.find(w => w.w === target) || THREE_KINGDOMS_PERSONS.find(w => w.w === target);
  
  // 处理自定义目标词（不在词库中）
  const isTargetCustom = !tObj;
  const isGuessCustom = !gObj;
  
  // 如果目标词是自定义的，使用简化相似度计算
  if (isTargetCustom) {
    // 只使用字符重叠计算相似度
    const gChars = new Set(guess.split(''));
    const tChars = new Set(target.split(''));
    let charMatch = 0;
    gChars.forEach(c => { if (tChars.has(c)) charMatch++; });
    const unionSz = new Set([...gChars, ...tChars]).size;
    const jaccard = unionSz > 0 ? charMatch / unionSz : 0;
    let pct = jaccard * 50 + 8;
    if (pct > 90) pct = 90;
    return { pct, exact: false };
  }
  
  // 如果猜测词不在词库中，但目标词在词库中
  if (!gObj || !tObj) return { pct: -1, exact: false };

  // 检查是否为三国人物
  const gIsThreeKingdoms = THREE_KINGDOMS_PERSONS.some(p => p.w === guess);
  const tIsThreeKingdoms = THREE_KINGDOMS_PERSONS.some(p => p.w === target);
  
  // 如果两者都是三国人物，使用专门的三国人物相似度算法
  if (gIsThreeKingdoms && tIsThreeKingdoms) {
    return threeKingdomsSimilarity(guess, target, gObj, tObj);
  }

  // 否则使用原来的通用算法
  const gVec = WORD_VECTORS[guess];
  const tVec = WORD_VECTORS[target];

  // ===== Multi-factor scoring (v3) =====
  // 设计原则：保底合理 + 拉开差距
  // 因子: 类别匹配(0-40) + 字符重叠(0-25) + 语义余弦(0-35) = 100分
  if (gVec && tVec) {
    const sim = cosineSim(gVec, tVec);

    // Factor 1: Category match (8-40 pts)
    // 保底8分，共享越多分数越高，不再用平方压低端
    let catPts = 8;
    if (gObj.cat && tObj.cat) {
      const gSet = new Set(gObj.cat), tSet = new Set(tObj.cat);
      const shared = [...gSet].filter(c => tSet.has(c)).length;
      const maxCats = Math.max(gSet.size, tSet.size);
      const ratio = maxCats > 0 ? shared / maxCats : 0;
      // 分层映射：共享越多分越高
      if (ratio >= 0.5) catPts = 40;           // 共享过半类别
      else if (ratio >= 0.33) catPts = 28;     // 共享1/3+
      else if (ratio > 0) catPts = 15;         // 至少共享1个
      // ratio=0 保持保底 8
    }

    // Factor 2: Character overlap (0-25 pts)
    const gChars = new Set(guess.split('')), tChars2 = new Set(target.split(''));
    let charMatch = 0;
    gChars.forEach(c => { if (tChars2.has(c)) charMatch++; });
    const unionSize = new Set([...gChars, ...tChars2]).size;
    const charPts = unionSize > 0 ? (charMatch / unionSize * 25) : 0;

    // Factor 3: Semantic cosine (5-35 pts)
    // 保底5分，线性映射，不再用幂函数压低端
    // 实测cosSim分布: [-0.1, 0.4]
    let semPts = 5;
    const normSim = Math.max(0, (sim + 0.1) / 0.5); // [-0.1,0.4] → [0,1]
    semPts = Math.round(normSim * 30 + 5);           // [0,1] → [5,35]
    semPts = Math.max(5, Math.min(35, semPts));

    const total = Math.max(8, Math.min(97, catPts + Math.round(charPts) + semPts));
    return { pct: total, exact: false };
  }

  // Fallback for words without vectors
  const gChars = new Set(guess.split(''));
  const tChars = new Set(target.split(''));
  let charMatch = 0;
  gChars.forEach(c => { if (tChars.has(c)) charMatch++; });
  const unionSz = new Set([...gChars, ...tChars]).size;
  const jaccard = unionSz > 0 ? charMatch / unionSz : 0;
  let pct = jaccard * 50 + 8;
  if (pct > 90) pct = 90;
  return { pct, exact: false };
}

// ===== GAME STATE =====
let targetWord = '';
let guessHistory = [];
let bestPercentage = 0;
let gameOver = false;
let currentMode = 'word'; // 'word' or 'person'

function pickTarget() {
  if (currentMode === 'person') {
    // Pick from Three Kingdoms persons
    const weighted = THREE_KINGDOMS_PERSONS.map((p, i) => ({ idx: i, weight: p.freq + Math.random() * 20 }));
    weighted.sort((a, b) => b.weight - a.weight);
    const pick = weighted[Math.floor(Math.random() * Math.floor(weighted.length * 0.5))]; // 前50%
    return THREE_KINGDOMS_PERSONS[pick.idx].w;
  } else {
    // Pick from normal words
    const weighted = WORDS.map((w, i) => ({ idx: i, weight: w.freq + Math.random() * 20 }));
    weighted.sort((a, b) => b.weight - a.weight);
    const pick = weighted[Math.floor(Math.random() * Math.floor(weighted.length * 0.3))];
    return WORDS[pick.idx].w;
  }
}

function newGame() {
  targetWord = pickTarget();
  guessHistory = [];
  bestPercentage = 0;
  gameOver = false;
  document.getElementById('history').innerHTML = '';
  document.getElementById('guessInput').value = '';
  document.getElementById('guessInput').disabled = false;
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('newGameBtn').style.display = 'none';
  document.getElementById('revealBtn').style.display = 'inline-block';
  document.getElementById('tryCount').textContent = '0';
  document.getElementById('bestPct').textContent = '—';
  document.getElementById('overlay').classList.remove('show');
  document.querySelector('.victory-card .emoji').textContent = '🎉';
  document.getElementById('guessInput').focus();
}

function submitGuess() {
  if (gameOver) return;
  const input = document.getElementById('guessInput');
  const guess = input.value.trim();
  if (!guess) return;

  // Check if word is in our list
  let found;
  if (currentMode === 'person') {
    found = THREE_KINGDOMS_PERSONS.find(w => w.w === guess);
  } else {
    found = WORDS.find(w => w.w === guess);
  }
  
  // 如果当前目标词是自定义的（不在词库中），允许任何有效输入
  const targetObj = WORDS.find(w => w.w === targetWord) || THREE_KINGDOMS_PERSONS.find(w => w.w === targetWord);
  const isCustomTarget = !targetObj;
  
  if (!found && !isCustomTarget) {
    shakeInput();
    const msg = currentMode === 'person' ? '⚠️ 请输入三国时期著名人物名字' : '⚠️ 请输入词库中的词语（常见名词）';
    showToast(msg);
    return;
  }

  // Check duplicate
  if (guessHistory.some(e => e.word === guess)) {
    shakeInput();
    showToast('🔄 这个词已经猜过了');
    return;
  }

  const result = similarity(guess, targetWord);
  guessHistory.push({ word: guess, pct: result.pct || 0 });

  // Win detection uses strict boolean flag, never float comparison
  if (result.exact) {
    showVictory();
    return;
  }

  const pct = result.pct;
  if (pct > bestPercentage) bestPercentage = pct;

  renderHistory();
  document.getElementById('tryCount').textContent = guessHistory.length;
  document.getElementById('bestPct').textContent = bestPercentage.toFixed(2) + '%';
  input.value = '';
  input.focus();
}

function renderHistory() {
  const history = document.getElementById('history');
  // Sort by pct descending
  const sorted = [...guessHistory].sort((a, b) => b.pct - a.pct);
  history.innerHTML = '';
  sorted.forEach((entry, i) => {
    const pct = entry.pct;
    // 统一使用 getBarColor 确保三处颜色一致：左边框、进度条、百分比文字
    const color = getBarColor(pct);
    const item = document.createElement('div');
    item.className = 'history-item';
    item.style.borderLeftColor = color;  // 边框颜色由函数控制
    item.style.animationDelay = (i * 0.03) + 's';
    item.innerHTML = `
      <span class="word">${entry.word}</span>
      <div class="bar-wrap"><div class="bar" style="width:0%;background:${color}"></div></div>
      <span class="pct" style="color:${color}">${pct.toFixed(2)}%</span>
    `;
    history.appendChild(item);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        item.querySelector('.bar').style.width = Math.min(pct, 100) + '%';
      });
    });
  });
}

function getBarColor(pct) {
  // 关联度越高 → 颜色越深（保持多色彩分类）
  if (pct >= 90) return '#9f1515';   // 红色 - 极热
  if (pct >= 70) return '#e65100';   // 深橙色 - 很热
  if (pct >= 60) return '#fbc02d';   // 深黄色 - 要改
  if (pct >= 40) return '#1b5e20';   // 深绿色  
  if (pct >= 20) return '#FFFFFF';   // 灰色 - 较冷 
  if (pct >= 10) return '#6B7280';   // 白色 - 很冷
  return '#6B7280';                  
}

function showVictory() {
  gameOver = true;
  document.getElementById('guessInput').disabled = true;
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('newGameBtn').style.display = 'inline-block';
  document.getElementById('revealBtn').style.display = 'none';
  document.getElementById('answerReveal').textContent = targetWord;
  const tries = guessHistory.length;
  let msg = '';
  if (tries === 1) msg = '🏆 一发入魂！你是猜词天才！';
  else if (tries <= 10) msg = `🎯 仅用了 ${tries} 次就猜中，太厉害了！`;
  else if (tries <= 50) msg = `👍 用了 ${tries} 次猜中，表现不错！`;
  else if (tries <= 100) msg = `😊 用了 ${tries} 次猜中，再接再厉！`;
  else msg = `😅 用了 ${tries} 次，坚持就是胜利！`;
  document.getElementById('victoryMsg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
  launchConfetti();
}

    const delay = Math.random() * 2;
    const size = 6 + Math.random() * 8;
    const duration = 2 + Math.random() * 2;
